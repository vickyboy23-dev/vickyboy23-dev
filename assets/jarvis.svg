<svg width="900" height="300" viewBox="0 0 900 300"
xmlns="http://www.w3.org/2000/svg">

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

.panel-title {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 30px;
  fill: #ffcb6b;
  text-anchor: middle;
}

.username {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  fill: #8a7cff;
  text-anchor: middle;
}

.status {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 20px;
  fill: #8a7cff;
}

.text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  fill: #e6e6ff;
}
</style>

<!-- background -->
<rect width="100%" height="100%" fill="#15132b"/>

<!-- panel -->
<rect
x="60"
y="40"
width="780"
height="220"
rx="10"
fill="#1b1534"
stroke="#8a7cff"
stroke-width="2"
/>

<!-- Jarvis title -->
<text x="450" y="90" class="panel-title">JARVIS AI</text>

<!-- username -->
<text x="450" y="120" class="username">VICKYBOY2309</text>

<!-- arc reactor status -->
<text x="120" y="170" class="status">ARC REACTOR STATUS</text>

<!-- information -->
<text x="120" y="200" class="text">⚡ Commits: 240</text>
<text x="120" y="225" class="text">⚡ Repositories: 2</text>
<text x="120" y="250" class="text">⚡ Languages: Python, Java, JavaScript, C</text>

</svg>
